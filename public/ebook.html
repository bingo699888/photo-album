<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>電子相簿 - 閱讀模式</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #eee;
    }
    .header {
      padding: 20px;
      text-align: center;
      width: 100%;
      background: #16213e;
    }
    .header h1 { font-size: 1.5rem; margin-bottom: 10px; }
    .viewer {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      width: 100%;
      max-width: 1000px;
    }
    .page-img {
      max-width: 100%;
      max-height: 65vh;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      cursor: pointer;
      transition: opacity 0.3s;
    }
    .controls {
      display: flex;
      gap: 20px;
      padding: 20px;
      background: #16213e;
      width: 100%;
      justify-content: center;
      align-items: center;
    }
    .controls button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      background: #0f3460;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .controls button:hover { background: #e94560; }
    .controls button:disabled { background: #333; cursor: not-allowed; }
    .page-info { font-size: 1rem; color: #aaa; min-width: 80px; text-align: center; }
    .progress {
      display: flex;
      gap: 4px;
      padding: 10px 20px;
      background: #16213e;
      overflow-x: auto;
      justify-content: center;
      flex-wrap: wrap;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #0f3460;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .dot.active { background: #e94560; }
    .dot:hover { background: #e94560; opacity: 0.7; }
    @media (max-width: 600px) {
      .controls button { padding: 10px 16px; font-size: 0.9rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 id="albumTitle">電子相簿</h1>
  </div>
  <div class="viewer" id="viewer">
    <img class="page-img" id="pageImg" src="" alt="Page">
  </div>
  <div class="controls">
    <button id="prevBtn" onclick="prevPage()">◀ 上一張</button>
    <span class="page-info" id="pageInfo">1 / 1</span>
    <button id="nextBtn" onclick="nextPage()">下一張 ▶</button>
  </div>
  <div class="progress" id="progress"></div>

  <script>
    const pageImg = document.getElementById('pageImg');
    const pageInfo = document.getElementById('pageInfo');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const progress = document.getElementById('progress');
    const viewer = document.getElementById('viewer');

    let current = 0;
    let images = [];

    const urlParams = new URLSearchParams(window.location.search);
    const albumId = urlParams.get('album') || 1;

    async function loadAlbum() {
      try {
        const res = await fetch(`/api/albums/${albumId}`);
        const album = await res.json();
        document.getElementById('albumTitle').textContent = album.title || '電子相簿';
        images = album.photos || [];
        if (images.length === 0) {
          pageImg.alt = '目前沒有照片';
          pageImg.src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><text y="100" font-size="100" text-anchor="middle">📷</text></svg>';
          return;
        }
        buildDots();
        showPage(0);
      } catch (err) {
        console.error(err);
        pageImg.alt = '載入失敗';
      }
    }

    function buildDots() {
      progress.innerHTML = '';
      images.forEach((_, i) => {
        const dot = document.createElement('div');
        dot.className = 'dot' + (i === 0 ? ' active' : '');
        dot.onclick = () => goTo(i);
        progress.appendChild(dot);
      });
    }

    function showPage(index) {
      if (images.length === 0) return;
      // 確保 index 在範圍內
      if (index < 0) index = 0;
      if (index >= images.length) index = images.length - 1;
      current = index;

      const img = images[index];
      // 嘗試多個 URL 來源
      const url = img.imgbb_url || img.url || img.thumbnail_url || img.src || '';
      pageImg.style.opacity = '0';
      setTimeout(() => {
        pageImg.src = url;
        pageImg.alt = `第 ${current + 1} 頁`;
        pageImg.style.opacity = '1';
      }, 150);

      pageInfo.textContent = `${current + 1} / ${images.length}`;
      prevBtn.disabled = current === 0;
      nextBtn.disabled = current === images.length - 1;

      document.querySelectorAll('.dot').forEach((d, i) => {
        d.classList.toggle('active', i === current);
      });
    }

    function prevPage() {
      if (current > 0) showPage(current - 1);
    }

    function nextPage() {
      if (current < images.length - 1) showPage(current + 1);
      else alert('已經是最後一張了！');
    }

    function goTo(index) {
      showPage(index);
    }

    // 點圖片也可前進
    pageImg.onclick = nextPage;

    // 鍵盤控制
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextPage(); }
      if (e.key === 'ArrowLeft') { e.preventDefault(); prevPage(); }
    });

    // 觸控滑動
    let touchStartX = 0;
    document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
    document.addEventListener('touchend', e => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 50) {
        if (diff > 0) nextPage();
        else prevPage();
      }
    });

    loadAlbum();
  </script>
</body>
</html>
