<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>電子相簿</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="container">
      <a href="/" class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
        電子相簿
      </a>
      <nav class="nav">
        <a href="/" class="active" data-page="home">首頁</a>
        <a href="/admin/index.html" id="adminLink" class="hidden">管理後台</a>
      </nav>
      <div class="user-menu">
        <span id="userDisplay" class="user-name hidden"></span>
        <button id="loginBtn" class="btn btn-primary btn-sm">登入</button>
        <button id="logoutBtn" class="btn btn-outline btn-sm hidden">登出</button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main">
    <div class="container">
      <!-- Home Page -->
      <div id="homePage">
        <div class="hero">
          <h1>📸 電子相簿</h1>
          <p>記錄每一個精彩瞬間</p>
        </div>

        <!-- Search -->
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="搜尋相簿...">
          <button class="btn btn-primary" onclick="searchAlbums()">搜尋</button>
        </div>

        <!-- Categories -->
        <h2 class="section-title">📁 分類</h2>
        <div id="categories" class="categories">
          <span class="loading"></span>
        </div>

        <!-- Albums -->
        <h2 class="section-title">📷 相簿列表</h2>
        <div id="albumsGrid" class="albums-grid">
          <span class="loading"></span>
        </div>

        <!-- Pagination -->
        <div id="pagination" class="pagination"></div>
      </div>

      <!-- Album Detail Page -->
      <div id="albumPage" class="hidden">
        <div class="album-header">
          <a href="/" class="btn btn-outline btn-sm">← 返回</a>
          <h1 id="albumTitle"></h1>
          <div class="album-meta-row">
            <span id="albumCategory"></span>
            <span id="albumDate"></span>
            <span id="albumCount"></span>
          </div>
          <div class="album-actions" id="albumActions">
            <button class="btn btn-primary btn-sm" onclick="downloadAlbum()">
              ⬇️ 下載全部
            </button>
          </div>
        </div>
        <div id="photosGrid" class="photos-grid"></div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>© 2024 電子相簿系統</p>
  </footer>

  <!-- Login Modal -->
  <div id="loginModal" class="modal-overlay">
    <div class="modal">
      <h2>登入</h2>
      <form id="loginForm">
        <div class="form-group">
          <label>帳號</label>
          <input type="text" name="username" required>
        </div>
        <div class="form-group">
          <label>密碼</label>
          <input type="password" name="password" required>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-outline" onclick="closeModal('loginModal')">取消</button>
          <button type="submit" class="btn btn-primary">登入</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Profile Modal -->
  <div id="profileModal" class="modal-overlay">
    <div class="modal">
      <h2>個人資料</h2>
      <form id="profileForm">
        <div class="form-group">
          <label>顯示名稱</label>
          <input type="text" name="displayName">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email">
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-outline" onclick="closeModal('profileModal')">取消</button>
          <button type="submit" class="btn btn-primary">儲存</button>
        </div>
      </form>
      <hr style="margin: 1.5rem 0; border: none; border-top: 1px solid var(--border);">
      <h3 style="font-size: 1rem; margin-bottom: 1rem;">修改密碼</h3>
      <form id="passwordForm">
        <div class="form-group">
          <label>舊密碼</label>
          <input type="password" name="oldPassword" required>
        </div>
        <div class="form-group">
          <label>新密碼</label>
          <input type="password" name="newPassword" required minlength="6">
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-danger btn-sm">變更密碼</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox">
    <button class="lightbox-nav lightbox-prev" onclick="lightboxPrev()">❮</button>
    <button class="lightbox-close" onclick="closeLightbox()">×</button>
    <div class="lightbox-content">
      <img id="lightboxImg" src="" alt="">
    </div>
    <div class="lightbox-info">
      <p id="lightboxCaption"></p>
      <p class="lightbox-counter" id="lightboxCounter"></p>
    </div>
    <button class="lightbox-nav lightbox-next" onclick="lightboxNext()">❯</button>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
